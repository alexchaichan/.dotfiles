[scrolling]
multiplier = 0

[shell]
args = ["tmux attach || tmux || zsh", "gpg-connect-agent reloadagent /bye"]
program = "wsl"

[window]
decorations = "none"
opacity = 0.9
startup_mode = "Windowed"

[window.dimensions]
columns = 190
lines = 42

[window.position]
x = 200
y = 200
